apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: anubis-api-dev
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/anubis-api/environments/dev
  # 🚀 AUTOMATED PRUNING: If you delete a resource from Git, Flux deletes it from AWS automatically!
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: default

