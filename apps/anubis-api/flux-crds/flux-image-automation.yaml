apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageRepository
metadata:
  name: anubis-api
  namespace: flux-system
spec:
  interval: 1m
  image: 533267265715.dkr.ecr.us-east-1.amazonaws.com/anubis-api:9f4cd868278288b2eee92da517b3921ebc47ab43
  secretRef:
    name: ecr-credentials  # IAM or credentials to pull ECR

---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImagePolicy
metadata:
  name: anubis-api-latest
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: anubis-api
  policy:
    semver:
      range: "*"  # Always pick the latest version

---
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: anubis-api-update
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  update:
    strategy: Setters