apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubis-api
  namespace: default
  labels:
    app: anubis-api
spec:
  replicas: 3 # Keeps exactly 2 copies of your app running for high-availability
  selector:
    matchLabels:
      app: anubis-api
  template:
    metadata:
      labels:
        app: anubis-api
    spec:
      containers:
        - name: anubis-api
          # Note: Flux will automatically overwrite this placeholder tag with your real live AWS ECR image hash later! Total Bullshit!
          image: 533267265715.dkr.ecr.us-east-1.amazonaws.com/anubis-api:3addcb8c26bfa3ee116458f4e2dbdd6eeef271d2
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

