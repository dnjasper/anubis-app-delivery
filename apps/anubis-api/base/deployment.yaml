apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubis-api
  namespace: default
  labels:
    app: anubis-api
spec:
  replicas: 4 # Keeps exactly 2 copies of your app running for high-availability
  selector:
    matchLabels:
      app: anubis-api
  template:
    metadata:
      labels:
        app: anubis-api
    spec:
      containers:
        - name: anubis-api
          # Note: Flux will automatically overwrite this placeholder tag with your real live AWS ECR image hash later! Total Bullshit!
          image: 533267265715.dkr.ecr.us-east-1.amazonaws.com/anubis-api:ca2a9bc24999fd42132003dc1bbb48fc0ae8d764 # {"$imagepolicy": "flux-system:anubis-api-latest"}
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
